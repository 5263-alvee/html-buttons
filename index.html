<style>
    .subscribe-button {
            background-color: rgb(200, 0, 0);
            color: white;    
            height: 40px;
            width: 95px;
            border-radius: 5px;  
            border: none;  
            cursor: pointer;
            margin-right: 10px;
            transition: opacity 0.2s;
    }         

    .subscribe-button:hover {
                opacity:0.8;
    }     
    .subscribe-button:active { 
                opacity:0.6;                         
    }       
            
    .join-button {
        background-color: white ;
        color: rgb(63, 132, 221);
        border-style: solid;
        border-width: 1px;
        border-color: rgb(63, 63, 221);
        height: 40px;
        width: 60px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
        transition: background-color 0.2s;
        color 0.2s;
    } 
    .join-button:hover {
        background-color: blue;
        color:white;
    }
    .join-button:active{
        opacity:0.5;
    }
    
    .tweeter-button {
        background-color: rgb(63, 132, 235);
        color:white;
        border-style: solid;
        height: 40px;
        width: 85px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        transition: box-shadow 0.15s;
    } 
    .tweeter-button:hover {
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.15);

    }
   
</style>


<button class="subscribe-button">
    SUBSCRIBE
</button>

<button class="join-button">
    JOIN
</button>

<button class="tweeter-button">
    Tweeter
</button>
